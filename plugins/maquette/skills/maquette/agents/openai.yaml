interface:
  display_name: "Maquette"
  short_description: "Run the full staged image-guided website workflow."
  default_prompt: "Use $maquette to run the full Maquette workflow: before the first Maquette image_gen create/edit call, resolve image-worker authorization. If subagents were not already explicitly authorized and the user did not explicitly decline or request no questions/no pauses/skip approvals, ask once whether to use Maquette image-worker subagents; do not say that lack of explicit authorization means images will be generated in the main workflow. When authorized, create or edit exactly one image artifact per image worker, require structured artifact metadata, create any accepted/available 2K derivative for Maquette reference artifacts, inspect the exact downstream artifact path using an absolute filesystem path, and ask for user approval after brand-board and page-concept final approval artifacts before deriving downstream artifacts. Do not infer unattended mode from requests for one pass, a final homepage, a fresh disposable test, or a full workflow; only skip questions when the user explicitly asks for no questions/no pauses/skip approvals. Create any missing focused foundational brand kit, then process component coverage sequentially by checking optional QA and image-prep tooling and asking for an install decision when any planned capability is blocked, including partial installs such as missing ajv-formats or missing sharp when safe reference upscaling is needed; generate one focused 1:1 visual component sheet at a time by default, derive a deterministic contract CSS bridge file after visual inspection, and write concrete category-prefixed componentized batch replica/reference, CSS/JS, catalog, and screenshot-reviewed artifacts before moving to the next needed sheet. Treat CSS-contract poster images as optional supplemental references only. Then create the requested page or screen with approved concept-region inventory, page layout contract, asset manifest, and fidelity QA. Do not automatically upscale final website assets such as logos, icons, hero banners, product images, textures, transparent assets, or other page media."
