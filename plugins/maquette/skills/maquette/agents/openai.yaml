interface:
  display_name: "Maquette"
  short_description: "Run the full staged image-guided website workflow."
  default_prompt: "Use $maquette to run the full Maquette workflow: before the first Maquette image_gen create/edit call, resolve image-worker authorization. If subagents were not already explicitly authorized and the user did not explicitly decline or request no questions/no pauses/skip approvals, ask once whether to use Maquette image-worker subagents; do not say that lack of explicit authorization means images will be generated in the main workflow. When authorized, create or edit images through the image-worker handoff, inspect returned project-local image paths using absolute filesystem paths, and ask for user approval after brand-board and page-concept images before deriving downstream artifacts. Do not infer unattended mode from requests for one pass, a final homepage, a fresh disposable test, or a full workflow; only skip questions when the user explicitly asks for no questions/no pauses/skip approvals. Create any missing focused foundational brand kit, then process component coverage sequentially by checking optional QA and image-prep tooling and asking for an install decision when any planned capability is blocked, including partial installs such as missing ajv-formats or missing sharp when safe reference upscaling is needed; generate one focused 1:1 text-only CSS-contract poster at a time by default, transcribe it into a contract CSS bridge file, and write concrete category-prefixed componentized batch replica/reference, CSS/JS, catalog, and screenshot-reviewed artifacts before moving to the next needed artifact. Generate visual component sheets only when explicitly requested or when the CSS-contract route is documented as blocked. Then create the requested page or screen with approved concept-region inventory, page layout contract, asset manifest, and fidelity QA."
