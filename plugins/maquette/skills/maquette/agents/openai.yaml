interface:
  display_name: "Maquette"
  short_description: "Run the full image-guided website workflow with greenfield direction, brand, components, and pages."
  default_prompt: "Use $maquette to choose the right Maquette workflow mode before generating artifacts. For a new website or brand with no approved Maquette brand kit, run Greenfield Website Mode: create or select a concrete direction concept, inspect it, ask for approval unless unattended mode is explicit, write .maquette/direction/direction-inventory.json, then create a constrained brand kit, critical-path component contracts, and the requested page. Before the first Maquette image_gen create/edit call, resolve image-worker authorization; do not treat lack of prior authorization as permission to skip image workers. When authorized, create or edit visual artifacts through the image-worker handoff, inspect returned project-local image paths, and ask for user approval after direction-concept, brand-board, and page-concept images before deriving downstream artifacts. Do not infer unattended mode from requests for one pass, a final homepage, a fresh disposable test, or a full workflow; only skip questions when the user explicitly asks for no questions/no pauses/skip approvals. Process component coverage sequentially by checking optional QA and image-prep tooling, asking for an install decision when needed, creating focused structured component contracts by default, optionally rendering deterministic posters, and writing concrete category-prefixed componentized batch replica/reference, CSS/JS, catalog, and screenshot-reviewed artifacts before moving to the next needed artifact. Generate visual component sheets only when explicitly requested or when creative clarification is useful. Then create the requested page or screen with approved concept-region inventory, page layout contract, asset manifest, thin-slice review when possible, and fidelity QA."
