interface:
  display_name: "Maquette"
  short_description: "Run the full staged image-guided website workflow."
  default_prompt: "Use $maquette to run the full Maquette workflow: create any missing focused foundational brand kit, then process component coverage sequentially by checking optional QA tooling and asking for an install decision when any planned QA capability is blocked, including partial installs such as missing ajv-formats; generate one focused 1:1 text-only CSS-contract poster at a time by default, transcribe it into a contract CSS bridge file, and write concrete category-prefixed componentized batch replica/reference, CSS/JS, catalog, and screenshot-reviewed artifacts before moving to the next needed artifact. Generate visual component sheets only when explicitly requested or when the CSS-contract route is documented as blocked. Then create the requested page or screen with concept-region inventory, page layout contract, asset manifest, and fidelity QA."
