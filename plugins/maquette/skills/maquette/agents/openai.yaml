interface:
  display_name: "Maquette"
  short_description: "Run the full image-guided website workflow with greenfield direction, brand, components, and pages."
  default_prompt: "Use $maquette to choose the right Maquette workflow mode before generating artifacts. The main workflow is the design owner: keep approved references, inspect worker outputs, ask approval questions, and make final accept/reject decisions in the main context. For a new website or brand with no approved Maquette brand kit, run Greenfield Website Mode: create or select a concrete direction concept, inspect it, ask for approval unless unattended mode is explicit, write .maquette/direction/direction-inventory.json, then create a constrained brand kit and executable brand canon before page work. Use image-worker subagents automatically when available; for multiple independent images, spawn one worker per image or independent batch in parallel waves, inspect every returned project-local path, and only then accept or use assets. Ask for user approval after direction-concept, brand-board, and page-concept images before deriving downstream artifacts unless approval skipping is explicit. Do not infer unattended mode from requests for one pass, a final homepage, a fresh disposable test, or a full workflow. Default to page-first after the brand canon: create a page concept, concept-region inventory, visual implementation contract, page layout contract, staged identity/product assets with asset consistency notes, a thin-slice proof, and just-in-time component contracts/browser proofs derived from the approved concept only for components the page needs; reserve broad component-library work for explicit Design System Mode. Never create Maquette-authored logos, wordmarks, monograms, mascots, emblems, lockups, or brand marks as code-generated SVG; identity assets are supplied assets or generated raster image assets only. Generate visual component sheets only when explicitly requested. Final page review must include region-level concept fidelity and fail major deviations or inconsistent generated assets before finalizing."
