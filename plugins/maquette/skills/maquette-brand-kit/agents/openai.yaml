interface:
  display_name: "Maquette Brand Kit"
  short_description: "Create or revise a focused website brand board and CSS token set from a brief or approved direction."
  default_prompt: "Use $maquette-brand-kit to create or revise a focused foundational website brand board with image_gen first. If .maquette/direction/direction-inventory.json exists, read it and use the selected direction as a constraint so the board preserves the approved visual tone, hierarchy, density, and component priorities while normalizing them into reusable brand rules. If existing website, code, screenshot, or supplied brand asset references are present, first create .maquette/brand/reference-inventory.md with preserved brand elements, supplied assets that must not be regenerated, allowed evolution, do-not-change constraints, accessibility issues, and uncertainties. Before generating or editing the board, resolve image-worker authorization: if subagents were not already explicitly authorized and the user did not explicitly decline or request no questions/no pauses/skip approvals, ask once whether to use Maquette image-worker subagents; do not treat lack of explicit authorization as permission to generate in the main workflow. When authorized, generate or edit the board through the image-worker handoff. Do not generate logos, wordmarks, brand marks, large product-name treatments, or detailed component inventories. Inspect the generated board or a same-size *-sharpened.png derivative when sharpening was useful, ask the user whether to use it or make a new one, do not include a separate revise choice, then only after approval produce design-system JSON, CSS tokens, token scope/maturity/source notes, font rationale, and approval notes. Preserve raw boards and do not use image prep to upscale or resize them."
