interface:
  display_name: "Maquette Brand Kit"
  short_description: "Create or revise a focused website brand board and CSS token set using image_gen first."
  default_prompt: "Use $maquette-brand-kit to create or revise a focused foundational website brand board with image_gen first. Before generating or editing the board, resolve image-worker authorization: if subagents were not already explicitly authorized and the user did not explicitly decline or request no questions/no pauses/skip approvals, ask once whether to use Maquette image-worker subagents; do not treat lack of explicit authorization as permission to generate in the main workflow. When authorized, generate or edit exactly one board artifact through the image-worker handoff and require structured metadata. Do not generate logos, wordmarks, brand marks, large product-name treatments, or detailed component inventories. Save the raw project artifact as brand-board-vN.png with a sidecar, check optional image-prep, create and inspect brand-board-vN-2k.png with project-local sharp and square --size 2048 when available or when the user approves installing optional image-prep tooling, then ask the user whether to use the final approval artifact or make a new one. Do not include a separate revise choice. Only after approval produce design-system JSON, CSS tokens, font rationale, and approval notes."
