interface:
  display_name: "Maquette Brand Kit"
  short_description: "Create or revise a focused website brand board and CSS token set using image_gen first."
  default_prompt: "Use $maquette-brand-kit to create or revise a focused foundational website brand board with image_gen first. Before generating or editing the board, resolve image-worker authorization: if subagents were not already explicitly authorized and the user did not explicitly decline or request no questions/no pauses/skip approvals, ask once whether to use Maquette image-worker subagents; do not treat lack of explicit authorization as permission to generate in the main workflow. When authorized, generate or edit the board through the image-worker handoff. Do not generate logos, wordmarks, brand marks, large product-name treatments, or detailed component inventories. Inspect the generated board using its absolute filesystem path, then create and inspect a 2048x2048 safe-upscaled derivative with project-local sharp when available or when the user approves installing optional image-prep tooling. Ask the user whether to use the inspected board or make a new one, do not include a separate revise choice, then only after approval produce design-system JSON, CSS tokens, font rationale, and approval notes."
