interface:
  display_name: "Maquette Components"
  short_description: "Build a reusable website component library from an approved design system, guided by focused image-generated CSS-contract posters."
  default_prompt: "Use $maquette-components to process focused 1:1 component artifacts sequentially: check optional QA tooling first, generate and inspect one 1:1 text-only CSS-contract poster by default, inventory it, build a faithful componentized batch replica/reference using reusable CSS/JS from the start, write category-prefixed batch artifacts under .maquette/components/ with CSS in css/ and JS in js/, complete screenshot or manual visual review against the source artifact, then move to the next needed artifact. Generate visual component sheets only when explicitly requested or when the CSS-contract route is documented as blocked. Use bundled Maquette scripts for screenshots, responsive audits, contrast/API checks, JSON validation, and page-consumption smoke where available."
