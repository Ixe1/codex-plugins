interface:
  display_name: "Maquette Components"
  short_description: "Build reusable website components from an approved brand canon, guided by focused structured contracts and browser proofs."
  default_prompt: "Use $maquette-components to process focused component batches sequentially after the executable brand canon exists. In default page-first workflows, derive focused component contracts from an approved page concept, concept-region inventory, and visual implementation contract rather than creating generic pre-page component galleries. Check optional QA and image-prep tooling first and ask for an install decision when any planned capability is blocked, including partial installs such as missing ajv-formats or missing sharp when same-size reference sharpening is needed. Create one focused structured component contract by default under .maquette/components/contracts/<batch>.contract.json using approved tokens, brand-primitives.css, brand-proof.html, direction inventory when present, page concept region when present, and a strict selector allowlist. Validate the contract when schema tooling is available, optionally render a deterministic .contract.svg poster with the bundled script, then build a faithful browser component proof/reference that imports tokens.css and brand-primitives.css. Write category-prefixed batch artifacts under .maquette/components/ with contracts in contracts/, CSS in css/, and JS in js/, complete screenshot or manual visual review against the contract, brand proof, and page concept region when present, then move to the next needed artifact. Do not generate visual component sheets unless the user explicitly requests them; when requested, use image-worker subagents automatically and inspect returned paths. Use bundled Maquette scripts for deterministic contract posters, same-size reference sharpening, screenshots, responsive audits, contrast/API checks, JSON validation, and page-consumption smoke where available."
