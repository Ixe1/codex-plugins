interface:
  display_name: "Maquette Components"
  short_description: "Build a reusable website component library from an approved design system, guided by focused image-generated component sheets."
  default_prompt: "Use $maquette-components to process focused 16:9 component sheets sequentially: check optional QA tooling first, generate and inspect one sheet, inventory it, build a faithful componentized batch replica/reference using reusable CSS/JS from the start, write category-prefixed batch artifacts under .maquette/components/ with CSS in css/ and JS in js/, complete screenshot or manual visual review against the sheet, then move to the next needed sheet. Use bundled Maquette scripts for screenshots, responsive audits, contrast/API checks, JSON validation, and page-consumption smoke where available."
