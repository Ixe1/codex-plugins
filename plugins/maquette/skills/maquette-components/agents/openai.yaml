interface:
  display_name: "Maquette Components"
  short_description: "Build a reusable website component library from an approved design system, guided by focused image-generated visual component sheets."
  default_prompt: "Use $maquette-components to process focused 1:1 visual component sheets sequentially: check optional QA and image-prep tooling first and ask for an install decision when any planned capability is blocked, including partial installs such as missing ajv-formats or missing sharp when safe reference upscaling is needed; before the first component sheet image_gen create/edit call, resolve image-worker authorization. If subagents were not already explicitly authorized and the user did not explicitly decline or request no questions/no pauses/skip approvals, ask once whether to use Maquette image-worker subagents; do not treat lack of explicit authorization as permission to generate in the main workflow. When authorized, generate or edit exactly one component image artifact per image worker, require structured artifact metadata, create any accepted/available 2K reference derivative with square --size 2048 for the 1:1 visual sheet, then inspect the exact downstream artifact path using its absolute filesystem path. Generate and inspect one focused visual component sheet by default, inventory it, derive contracts/<batch>.contract.css deterministically from visual inspection, build a faithful componentized batch replica/reference using reusable CSS/JS from the start, write category-prefixed batch artifacts under .maquette/components/ with contracts in contracts/, CSS in css/, and JS in js/, complete screenshot or manual visual review against the source sheet, then move to the next needed sheet. Treat CSS-contract poster images as optional supplemental references only when explicitly requested or justified after the visual sheet exists. Use bundled Maquette scripts for safe reference upscaling, screenshots, responsive audits, contrast/API checks, JSON validation, and page-consumption smoke where available."
