interface:
  display_name: "Maquette Components"
  short_description: "Build a reusable website component library from an approved design system, guided by focused structured component contracts."
  default_prompt: "Use $maquette-components to process focused component batches sequentially: check optional QA and image-prep tooling first and ask for an install decision when any planned capability is blocked, including partial installs such as missing ajv-formats or missing sharp when same-size reference sharpening is needed. Create one focused structured component contract by default under .maquette/components/contracts/<batch>.contract.json using the approved brand tokens, direction inventory when present, and a strict selector allowlist. Validate the contract when schema tooling is available, optionally render a deterministic .contract.svg poster with the bundled script, then build a faithful componentized batch replica/reference using reusable CSS/JS from the start. Write category-prefixed batch artifacts under .maquette/components/ with contracts in contracts/, CSS in css/, and JS in js/, complete screenshot or manual visual review against the contract and any visual sheet, then move to the next needed artifact. Before any visual component sheet image_gen create/edit call, resolve image-worker authorization; generate visual sheets only when explicitly requested or when creative clarification is useful. Use bundled Maquette scripts for deterministic contract posters, same-size reference sharpening, screenshots, responsive audits, contrast/API checks, JSON validation, and page-consumption smoke where available."
