interface:
  display_name: "Maquette Components"
  short_description: "Build a reusable website component library from an approved design system, guided by focused image-generated CSS-contract posters."
  default_prompt: "Use $maquette-components to process focused 1:1 component artifacts sequentially: check optional QA tooling first and ask for an install decision when any planned QA capability is blocked, including partial installs such as missing ajv-formats; before the first component poster/sheet image_gen create/edit call, resolve image-worker authorization. If subagents were not already explicitly authorized and the user did not explicitly decline or request no questions/no pauses/skip approvals, ask once whether to use Maquette image-worker subagents; do not treat lack of explicit authorization as permission to generate in the main workflow. When authorized, generate or edit component poster/sheet images through the image-worker handoff, then inspect the returned project-local image path using its absolute filesystem path. Generate and inspect one 1:1 text-only CSS-contract poster by default, inventory it, transcribe it into contracts/<batch>.contract.css, build a faithful componentized batch replica/reference using reusable CSS/JS from the start, write category-prefixed batch artifacts under .maquette/components/ with contracts in contracts/, CSS in css/, and JS in js/, complete screenshot or manual visual review against the source artifact, then move to the next needed artifact. Generate visual component sheets only when explicitly requested or when the CSS-contract route is documented as blocked. Use bundled Maquette scripts for screenshots, responsive audits, contrast/API checks, JSON validation, and page-consumption smoke where available."
