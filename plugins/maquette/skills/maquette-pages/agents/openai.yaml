interface:
  display_name: "Maquette Pages"
  short_description: "Create website page concepts with image_gen, then implement them with approved brand and component references."
  default_prompt: "Use $maquette-pages to verify reusable component coverage and catalog API readiness, request focused missing component/composite/navigation/product-card/footer-social sheets when needed, check optional QA and image-prep tooling and ask for an install decision when any planned capability is blocked, including partial installs such as missing ajv-formats or missing sharp when safe reference upscaling is needed. Before the first page concept or raster asset image_gen create/edit call, resolve image-worker authorization. If subagents were not already explicitly authorized and the user did not explicitly decline or request no questions/no pauses/skip approvals, ask once whether to use Maquette image-worker subagents; do not treat lack of explicit authorization as permission to generate in the main workflow. When authorized, create or revise the page concept image through the image-worker handoff. Inspect the returned project-local concept image using its absolute filesystem path, ask the user whether to use it or make a new one, do not include a separate revise choice, then only after approval inventory visible concept regions, write a page layout contract for section compactness, media fit/crop behavior, terminal regions, and responsive structure, create an asset manifest, and implement the website page using approved brand and reusable component references. QA concept fidelity, layout-contract fidelity, assets, typography, card anatomy, media containers, terminal-section compactness, footer fidelity, mobile drawer scrollability, social icons, responsive navigation, and overflow."
