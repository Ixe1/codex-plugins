interface:
  display_name: "Maquette Pages"
  short_description: "Create website page concepts with image_gen, then implement them with approved brand and component references."
  default_prompt: "Use $maquette-pages to verify reusable component coverage and catalog API readiness, request focused missing component/composite/navigation/product-card/footer-social sheets when needed, check optional QA tooling and ask for an install decision when any planned QA capability is blocked, including partial installs such as missing ajv-formats, create or revise a page concept image with image_gen, inventory visible concept regions, write a page layout contract for section compactness, media fit/crop behavior, terminal regions, and responsive structure, create an asset manifest, then implement the website page using approved brand and reusable component references. QA concept fidelity, layout-contract fidelity, assets, typography, card anatomy, media containers, terminal-section compactness, footer fidelity, mobile drawer scrollability, social icons, responsive navigation, and overflow."
