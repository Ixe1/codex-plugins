interface:
  display_name: "Maquette Pages"
  short_description: "Create website page concepts with image_gen, then implement them with approved brand and component references."
  default_prompt: "Use $maquette-pages after the executable brand canon exists: design-system.json, tokens.css, brand-primitives.css, brand-proof.html, and brand-proof-review.md. Read .maquette/direction/direction-inventory.json when present as directional context, but use the approved brand canon and existing component catalog APIs as implementation source of truth. Use image-worker subagents automatically when available; create or revise the page concept through a worker, and generate independent raster assets through one worker per image or independent batch in parallel waves. Inspect every returned project-local image path before use. Ask whether to use the page concept after inspection unless approval skipping is explicit, then inventory visible concept regions, write a page layout contract, create an asset manifest, and build a thin slice before full page implementation. Create just-in-time focused component contracts/browser proofs for missing page-critical components rather than a broad component library unless Design System Mode was requested. Never create Maquette-authored logos, wordmarks, monograms, mascots, emblems, lockups, or brand marks as code-generated SVG; identity assets are supplied assets or generated raster image assets only. QA concept fidelity, brand-proof fidelity, layout-contract fidelity, asset inspection, typography, card anatomy, media containers, terminal-section compactness, footer fidelity, mobile drawer scrollability, social icons, responsive navigation, and overflow."
