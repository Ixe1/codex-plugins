interface:
  display_name: "Maquette Pages"
  short_description: "Create website page concepts with image_gen, then implement the approved concept with strict fidelity review."
  default_prompt: "Use $maquette-pages after the executable brand canon exists: design-system.json, tokens.css, brand-primitives.css, brand-proof.html, and brand-proof-review.md. Read .maquette/direction/direction-inventory.json when present as directional context, but use the approved brand canon as primitive source of truth and existing component catalog APIs only as reusable implementation context. Use image-worker subagents automatically when available; create or revise the page concept through a worker, inspect it in the main context, and ask whether to use it unless approval skipping is explicit. If the full-page concept is too compressed to implement a section exactly, generate a fresh same-system section/detail concept before coding that section. After approval, inventory visible concept regions, write visual-implementation-contract.md and page-layout-contract.md, then create the asset manifest. Generate identity/product references first when needed, write asset-consistency.md, then generate dependent raster assets in staged parallel waves. Inspect every returned project-local image path before use and reject assets with alternate brand names, inconsistent labels, concept-breaking art direction, or wrong section role/crop/scale. Implement the page section by section from the approved concept and brand canon; screenshot-compare and repair each major section when practical. Create component contracts/browser proofs before the first page only for Design System Mode, immediate multi-page reuse, or complex reusable interactions; ordinary headers, cards, newsletter strips, promo/story bands, and rich footers should be page-local first and backfilled later. Never create Maquette-authored logos, wordmarks, monograms, mascots, emblems, lockups, or brand marks as code-generated SVG; identity assets are supplied assets or generated raster image assets only. QA concept fidelity, region-level visual contract fidelity, brand-proof fidelity, layout-contract fidelity, asset consistency, typography, card anatomy, media containers, terminal-section compactness, footer fidelity, mobile drawer scrollability, social icons, responsive navigation, and overflow. Do not mark final review approved while major deviations, strict-region minor deviations, missing regions, silent simplifications, or inconsistent generated assets remain."
