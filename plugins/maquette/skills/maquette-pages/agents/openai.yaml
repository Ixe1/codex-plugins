interface:
  display_name: "Maquette Pages"
  short_description: "Create website page concepts with image_gen, then implement the approved concept with strict fidelity review."
  default_prompt: "Use $maquette-pages after the executable brand canon exists: design-system.json, tokens.css, brand-primitives.css, brand-proof.html, and brand-proof-review.md. Read .maquette/direction/direction-inventory.json when present as directional context, but use the approved brand canon as primitive source of truth and existing component catalog APIs only as reusable implementation context. Use image-worker subagents automatically when available; create or revise the page concept through a worker, inspect it in the main context, and ask whether to use it unless approval skipping is explicit. After approval, inventory visible concept regions, write visual-implementation-contract.md and page-layout-contract.md, then create the asset manifest. Generate identity/product references first when needed, write asset-consistency.md, then generate dependent raster assets in staged parallel waves. Inspect every returned project-local image path before use and reject assets with alternate brand names, inconsistent labels, or concept-breaking art direction. Create just-in-time focused component contracts/browser proofs from approved concept regions rather than a broad component library unless Design System Mode was requested. Never create Maquette-authored logos, wordmarks, monograms, mascots, emblems, lockups, or brand marks as code-generated SVG; identity assets are supplied assets or generated raster image assets only. QA concept fidelity, region-level visual contract fidelity, brand-proof fidelity, layout-contract fidelity, asset consistency, typography, card anatomy, media containers, terminal-section compactness, footer fidelity, mobile drawer scrollability, social icons, responsive navigation, and overflow. Do not mark final review approved while major deviations, missing regions, silent simplifications, or inconsistent generated assets remain."
