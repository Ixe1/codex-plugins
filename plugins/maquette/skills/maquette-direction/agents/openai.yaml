interface:
  display_name: "Maquette Direction"
  short_description: "Create greenfield page direction concepts before the brand kit is locked."
  default_prompt: "Use $maquette-direction to explore greenfield website direction before creating a brand kit. Create a lightweight direction brief, use image-worker subagents automatically when available, generate 2-3 concrete page direction concepts in parallel when multiple concepts are needed, inspect every returned project-local image path, ask which direction to use unless the user explicitly requested unattended/no-question mode, then write a direction inventory that records visual direction, hierarchy, future component candidates, asset needs, responsive implications, accessibility risks, ambiguities, and page-local flourishes for the brand-kit and page phases. Component contracts before the first page are reserved for Design System Mode, immediate multi-page reuse, or complex reusable interactions."
